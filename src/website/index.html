<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glossary Extractor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        let isDarkMode = (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches));
        localStorage.theme = isDarkMode ? 'dark' : 'light';
        document.documentElement.classList.toggle('dark', isDarkMode);

        let currentLang = localStorage.lang || 'en';
        localStorage.lang = currentLang;
        document.documentElement.lang = currentLang;
    </script>

    <style>
        .dark ::-webkit-scrollbar { width: 12px; }
        .dark ::-webkit-scrollbar-track { background: #1f2937; }
        .dark ::-webkit-scrollbar-thumb {
            background-color: #4b5563;
            border-radius: 6px;
            border: 3px solid #1f2937;
        }
        .dark ::-webkit-scrollbar-thumb:hover { background-color: #6b7280; }

        .file-item:hover .remove-file { opacity: 1; }
        #queue-status { transition: opacity 0.3s ease-in-out; }

        .glossary-term, .glossary-definition {
            cursor: text;
            transition: background-color 0.2s ease-in-out, color 0.2s ease-in-out;
            border-radius: 4px;
            padding: 2px 4px;
            margin: -2px -4px;
        }

        .glossary-term:hover, .glossary-definition:hover { background-color: #f0f4ff; }
        .dark .glossary-term:hover, .dark .glossary-definition:hover { background-color: #374151; color: #e5e7eb; }

        .glossary-term:focus, .glossary-definition:focus {
            outline: 1px solid #a3bffa;
            background-color: #e6eeff;
        }
        .dark .glossary-term:focus, .dark .glossary-definition:focus {
            outline: 1px solid #3b82f6;
            background-color: #1e3a8a;
            color: white;
        }

        .glossary-item .action-buttons { opacity: 0; transition: opacity 0.2s ease-in-out; }
        .glossary-item:hover .action-buttons { opacity: 1; }

        .glossary-item.removed .glossary-term,
        .glossary-item.removed .glossary-definition {
            text-decoration: line-through;
            color: #9ca3af;
            cursor: default;
        }
        .dark .glossary-item.removed .glossary-term,
        .dark .glossary-item.removed .glossary-definition {
            color: #6b7280;
        }

        .glossary-item.removed .remove-btn { display: none; }
        .glossary-item:not(.removed) .restore-btn { display: none; }
        #result-content.hide-removed .glossary-item.removed { display: none; }

        .action-btn {
            display: inline-flex;
            align-items: center; justify-content: center;
            width: 28px; height: 28px;
            border-radius: 9999px;
            transition: background-color 0.2s ease-in-out;
        }

        .action-btn svg { width: 16px; height: 16px; }

        .remove-btn:hover, .remove-file:hover { background-color: #fee2e2; border-radius: 5px; color: #dc2626; }
        .dark .remove-btn:hover, .dark .remove-file:hover { background-color: #7f1d1d; color: #fca5a5; }

        .restore-btn:hover { background-color: #dcfce7; border-radius: 5px; color: #16a34a; }
        .dark .restore-btn:hover { background-color: #064e3b; color: #86efac; }

        .new-term-editor {
            background-color: #fefce8;
            border: 1px solid #fde047;
            border-radius: 6px;
            padding: 12px;
        }
        .dark .new-term-editor {
            background-color: #422006;
            border-color: #a16207;
        }

        .glossary-item.local-term {
            border-left: 3px solid #facc15;
            padding-left: 10px;
            background-color: #fefce8;
        }
        .dark .glossary-item.local-term {
            background-color: #422006;
            border-left-color: #ca8a04;
        }

        .glossary-item.local-term .glossary-term,
        .glossary-item.local-term .glossary-definition {
            cursor: default;
            background-color: transparent !important;
        }

        [contenteditable][data-placeholder]:empty::before {
            content: attr(data-placeholder);
            color: #9ca3af;
            pointer-events: none;
        }

        [contenteditable][data-placeholder]:not(:focus):has(br:only-child)::before {
            content: attr(data-placeholder);
            color: #9ca3af;
        }

        .dark [contenteditable][data-placeholder]:empty::before { color: #d1d5db; }
        .dark [contenteditable][data-placeholder]:not(:focus):has(br:only-child)::before { color: #d1d5db;  }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 transition-colors duration-300 font-sans flex flex-col min-h-screen">

    <header class="bg-white dark:bg-gray-800 shadow-sm transition-colors duration-300">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100 flex items-center gap-2">
                <img src="favicon.ico" class="w-8 h-8" alt="Logo">
                <span data-lang="app_title">Glossary Extractor</span>
            </h1>

            <div class="flex items-center gap-3">
                <select id="lang-toggle" class="bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 border border-gray-300 dark:border-gray-600 rounded p-1 text-sm focus:ring-2 focus:ring-blue-500 cursor-pointer outline-none transition-colors">
                    <option value="en">EN</option>
                    <option value="lv">LV</option>
                </select>
                <button id="theme-toggle" class="p-2 rounded-full text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-100 dark:focus:ring-offset-gray-800 focus:ring-blue-500 transition-colors">
                    <svg id="theme-icon-light" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                    <svg id="theme-icon-dark" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                </button>
            </div>
        </div>
    </header>

    <div class="container mx-auto p-4 flex-grow">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="flex flex-col gap-4">
                <div id="job-tracker" class="bg-white dark:bg-gray-800 p-4 rounded-lg shadow-md transition-colors duration-300">
                    <h2 class="text-xl font-bold mb-2 text-gray-800 dark:text-gray-200" data-lang="job_tracker">Job Tracker</h2>
                    <div id="job-list" class="text-sm text-gray-600 dark:text-gray-400" data-lang="connecting">Connecting to server...</div>
                </div>
                <div id="drop-and-file-list" class="bg-white dark:bg-gray-800 p-4 rounded-lg shadow-md transition-colors duration-300">
                    <div id="drop-box" class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-lg p-8 text-center cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 transition-colors">
                        <p data-lang="drag_drop">Drag & drop files here or click to select</p>
                        <input type="file" id="file-input" multiple class="hidden">
                    </div>
                    <div id="queue-status" class="mt-4 text-center font-semibold text-blue-600 dark:text-blue-400 opacity-0"></div>
                    <div id="file-list" class="mt-4 text-gray-700 dark:text-gray-300"></div>
                    <button id="generate-glossary" class="mt-4 w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 disabled:bg-gray-400 dark:disabled:bg-gray-600 disabled:cursor-not-allowed transition-colors" disabled data-lang="generate">Generate Glossary</button>
                </div>
            </div>

            <div id="result" class="bg-white dark:bg-gray-800 p-4 rounded-lg shadow-md transition-colors duration-300">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold mr-2 text-gray-800 dark:text-gray-200" data-lang="results">Glossary Results</h2>
                    <div class="flex items-center space-x-2">
                        <button id="export-pdf-btn" data-lang-title="export_pdf" title="Export as PDF" class="action-btn bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-blue-100 hover:text-blue-700 dark:hover:bg-blue-900 dark:hover:text-blue-300 transition-colors hidden">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
                            </svg>
                        </button>
                        <button id="add-term-btn" data-lang-title="add_term" title="Add New Term" class="action-btn bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-blue-100 hover:text-blue-700 dark:hover:bg-blue-900 dark:hover:text-blue-300 transition-colors hidden">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5">
                                <path d="M10.75 4.75a.75.75 0 00-1.5 0v4.5h-4.5a.75.75 0 000 1.5h4.5v4.5a.75.75 0 001.5 0v-4.5h4.5a.75.75 0 000-1.5h-4.5v-4.5z" />
                            </svg>
                        </button>
                        <label for="show-removed-toggle" class="inline-flex items-center cursor-pointer">
                            <span class="relative">
                                <input type="checkbox" id="show-removed-toggle" class="sr-only peer" checked>
                                <div class="w-10 h-6 bg-gray-200 dark:bg-gray-600 rounded-full peer-checked:bg-blue-600 transition-colors"></div>
                                <div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition-transform peer-checked:translate-x-4"></div>
                            </span>
                            <span class="ml-3 text-sm text-gray-600 dark:text-gray-400 select-none" data-lang="show_removed">Show removed</span>
                        </label>
                    </div>
                </div>
                <div id="result-content" class="text-gray-700 dark:text-gray-300">
                    <p data-lang="results_placeholder">Results will be displayed here.</p>
                </div>
            </div>
        </div>
    </div>
    <footer class="py-4 border-t border-gray-200 dark:border-gray-700 text-center text-sm text-gray-500 dark:text-gray-400 transition-colors duration-300">
        <p>
            &copy; <span id="current-year">0000</span> <span data-lang="app_title">Glossary Extractor</span> &middot;
            <a href="mailto:contact@example.com" class="hover:underline" data-lang="contact">Contact</a> &middot;
            <a href="/LICENSE" target="_blank" class="hover:underline" data-lang="license">LICENSE</a>
        </p>
    </footer>

    <script>
        const lang = {
            en: {
                app_title: "Glossary Extractor", job_tracker: "Job Tracker", connecting: "Connecting to server...",
                no_active_jobs: "No active jobs.", disconnected: "Disconnected.", drag_drop: "Drag & drop files here or click to select",
                generate: "Generate Glossary", results: "Glossary Results", export_pdf: "Export as PDF", add_term: "Add New Term",
                show_removed: "Show removed", results_placeholder: "Results will be displayed here.", contact: "Contact", license: "LICENSE",
                hashing: "Hashing...", waiting: "Waiting...", checking: "Checking server...", uploading: "Uploading...", ready: "Ready",
                error: "Error:", queue_pos: "Queue position:", active: "active", waiting_q: "waiting", remove_term: "Remove Term", restore_term: "Restore Term",
                fetching: "Fetching and combining glossaries...", no_files_ready: "No files are ready.", no_terms_found: "No glossary terms were found in the selected files.",
                error_occurred: "An error occurred:", cancel: "Cancel", save_term: "Save Term", new_term_ph: "New term...", definition_ph: "Definition...",
                provide_both: "Please provide both a term and a definition.", no_terms_export: "No active terms to export.", creating_pdf: "Creating PDF...",
                allow_popups: "Please allow popups to view the PDF.", error_pdf: "Error generating PDF: ", not_connected: "Not connected to the server yet.",
                pdf_col_term: "Term", pdf_col_def: "Definition",
                job_queued: "Queued", job_uploading: "Uploading", job_extracting: "Extracting",
                job_processing: "Processing", job_failed: "Failed"
            },
            lv: {
                app_title: "Glosāriju Ekstraktors", job_tracker: "Darbu izsekotājs", connecting: "Savienojas ar serveri...",
                no_active_jobs: "Nav aktīvu darbu.", disconnected: "Atvienots.", drag_drop: "Pārvelciet failus šeit vai noklikšķiniet, lai izvēlētos",
                generate: "Ģenerēt glosāriju", results: "Glosārija rezultāti", export_pdf: "Eksportēt kā PDF", add_term: "Pievienot jaunu terminu",
                show_removed: "Rādīt dzēstos", results_placeholder: "Rezultāti tiks parādīti šeit.", contact: "Kontakti", license: "LICENCE",
                hashing: "Kontrolsummas aprēķins...", waiting: "Gaida...", checking: "Pārbauda serveri...", uploading: "Augšupielādē...", ready: "Gatavs",
                error: "Kļūda:", queue_pos: "Rindas pozīcija:", active: "aktīvi", waiting_q: "gaida", remove_term: "Dzēst terminu", restore_term: "Atjaunot terminu",
                fetching: "Iegūst un apvieno glosārijus...", no_files_ready: "Nav gatavu failu.", no_terms_found: "Izvēlētajos failos netika atrasti glosārija termini.",
                error_occurred: "Notika kļūda:", cancel: "Atcelt", save_term: "Saglabāt terminu", new_term_ph: "Jauns termins...", definition_ph: "Definīcija...",
                provide_both: "Lūdzu, norādiet gan terminu, gan definīciju.", no_terms_export: "Nav aktīvu terminu eksportēšanai.", creating_pdf: "Veido PDF...",
                allow_popups: "Lūdzu, atļaujiet uznirstošos logus, lai skatītu PDF.", error_pdf: "Kļūda ģenerējot PDF: ", not_connected: "Vēl nav savienojuma ar serveri.",
                pdf_col_term: "Termins", pdf_col_def: "Definīcija",
                job_queued: "Gaidīšanas rindā", job_uploading: "Augšupielādē", job_extracting: "Ekstraktē",
                job_processing: "Apstrādā", job_failed: "Neizdevās"
            }
        };

        function translatePage() {
            document.querySelectorAll('[data-lang]').forEach(el => {
                if (lang[currentLang][el.getAttribute('data-lang')]) el.innerText = lang[currentLang][el.getAttribute('data-lang')];
            });

            document.querySelectorAll('[data-lang-title]').forEach(el => {
                if (lang[currentLang][el.getAttribute('data-lang-title')]) el.setAttribute('title', lang[currentLang][el.getAttribute('data-lang-title')]);
            });

            document.querySelectorAll('.glossary-term[data-placeholder]').forEach(el => el.setAttribute('data-placeholder', lang[currentLang].new_term_ph));
            document.querySelectorAll('.glossary-definition[data-placeholder]').forEach(el => el.setAttribute('data-placeholder', lang[currentLang].definition_ph));
        }

        const themeToggleButton = document.getElementById('theme-toggle');
        const lightIcon = document.getElementById('theme-icon-light');
        const darkIcon = document.getElementById('theme-icon-dark');
        const langToggle = document.getElementById('lang-toggle');
        langToggle.value = currentLang;

        function applyTheme(theme) {
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
                lightIcon.classList.remove('hidden');
                darkIcon.classList.add('hidden');
                localStorage.theme = 'dark';
            } else {
                document.documentElement.classList.remove('dark');
                lightIcon.classList.add('hidden');
                darkIcon.classList.remove('hidden');
                localStorage.theme = 'light';
            }
        }

        langToggle.addEventListener('change', (e) => {
            currentLang = e.target.value;
            localStorage.lang = currentLang;
            document.documentElement.lang = currentLang;
            translatePage();
            if (filesToProcess.size > 0) { renderFileList(); }
            if (window.lastQueueState) { renderQueueStatus(window.lastQueueState); }
            if (window.lastJobsState) { renderJobTracker(window.lastJobsState); }
        });

        themeToggleButton.addEventListener('click', () => {
            const currentTheme = localStorage.theme === 'dark' ? 'light' : 'dark';
            applyTheme(currentTheme);
        });

        const initialTheme = localStorage.theme || 'dark';
        applyTheme(initialTheme);
        translatePage();

        document.getElementById('current-year').textContent = new Date().getFullYear();
        const dropBox = document.getElementById('drop-box');
        const fileInput = document.getElementById('file-input');
        const fileList = document.getElementById('file-list');
        const jobList = document.getElementById('job-list');
        const generateGlossaryBtn = document.getElementById('generate-glossary');
        const resultContent = document.getElementById('result-content');
        const queueStatusDiv = document.getElementById('queue-status');
        const addTermBtn = document.getElementById('add-term-btn');
        const exportPdfBtn = document.getElementById('export-pdf-btn');
        const filesToProcess = new Map();
        var socketId;

        var socket = io();
        socket.on('connect', () => console.log('Connected to server'));
        socket.on('unique-id', (id) => { socketId = id; });
        socket.on('tracker-update', renderJobTracker);
        socket.on('queue-update', renderQueueStatus);
        socket.on('disconnect', () => jobList.innerHTML = `<p class="text-red-500" data-lang="disconnected">${lang[currentLang].disconnected}</p>`);

        dropBox.addEventListener('click', () => fileInput.click());
        dropBox.addEventListener('dragover', (e) => { e.preventDefault(); dropBox.classList.add('border-blue-500', 'bg-blue-50', 'dark:bg-gray-700'); });
        dropBox.addEventListener('dragleave', () => dropBox.classList.remove('border-blue-500', 'bg-blue-50', 'dark:bg-gray-700'));
        dropBox.addEventListener('drop', (e) => { e.preventDefault(); dropBox.classList.remove('border-blue-500', 'bg-blue-50', 'dark:bg-gray-700'); handleFiles(e.dataTransfer.files); });
        fileInput.addEventListener('change', () => { handleFiles(fileInput.files); fileInput.value = ''; });

        function uuidv4() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
                const r = Math.random() * 16 | 0;
                return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
            });
        }


        function renderJobTracker(jobs) {
            window.lastJobsState = jobs;
            jobList.innerHTML = jobs && jobs.length > 0 ? '' : lang[currentLang].no_active_jobs;

            const statusMap = {
                'Queued': lang[currentLang].job_queued,
                'Uploading': lang[currentLang].job_uploading,
                'Extracting': lang[currentLang].job_extracting,
                'Processing': lang[currentLang].job_processing,
                'Failed': lang[currentLang].job_failed
            };

            (jobs || []).slice(0, 5).forEach(job => {
                const progress = Math.round(job.progress);
                const jobItem = document.createElement('div');
                const localizedStatus = statusMap[job.status] || job.status;
                jobItem.className = 'mb-2';
                jobItem.innerHTML = `
                    <div class="flex justify-between text-sm">
                        <span class="font-semibold truncate pr-2 text-gray-700 dark:text-gray-300">${job.filename}</span>
                        <span class="text-gray-500 dark:text-gray-400">${localizedStatus}</span>
                    </div>
                    <div class="w-full bg-gray-200 dark:bg-gray-600 rounded-full h-1.5"><div class="bg-blue-600 h-1.5 rounded-full" style="width: ${progress}%"></div></div>`;
                jobList.appendChild(jobItem);
            });
        }

        function renderQueueStatus(state) {
            console.log('queue-update', state);
            window.lastQueueState = state;
            queueStatusDiv.innerHTML = state && state.waitingPosition > 0 ? `${lang[currentLang].queue_pos} ${state.waitingPosition} (${state.activeCount} ${lang[currentLang].active} / ${state.waitingCount} ${lang[currentLang].waiting_q})` : '';
        }

        function renderFileList() {
            fileList.innerHTML = '';

            filesToProcess.forEach(({ hash, file, status, data, progress }, id) => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item flex items-center justify-between p-2 border-b border-gray-200 dark:border-gray-700';
                let statusIndicator = '';
                if (status === 'hashing') { statusIndicator = `<div class="flex-1"><p class="text-gray-500 text-sm">${lang[currentLang].hashing}</p><div class="w-full bg-gray-200 dark:bg-gray-600 rounded-full h-1.5"><div class="bg-yellow-500 h-1.5 rounded-full" style="width: ${progress}%"></div></div></div>`; }
                if (status === 'waiting') { statusIndicator = `<span class="text-gray-500 dark:text-gray-400">${lang[currentLang].waiting}</span>`; }
                if (status === 'checking') { statusIndicator = `<span class="text-gray-500 dark:text-gray-400">${lang[currentLang].checking}</span>`; }
                if (status === 'uploading') { statusIndicator = `<div class="flex-1"><p class="text-gray-500 text-sm">${lang[currentLang].uploading}</p><div class="w-full bg-gray-200 dark:bg-gray-600 rounded-full h-1.5"><div class="bg-blue-500 h-1.5 rounded-full" style="width: ${progress}%"></div></div></div>`; }
                if (status === 'complete') { statusIndicator = `<span class="text-green-500">${lang[currentLang].ready}</span>`; }
                if (status === 'error') { statusIndicator = `<span class="text-red-500">${lang[currentLang].error} ${data}</span>`; }
                fileItem.innerHTML = `<p class="font-semibold flex-1 mr-4 truncate text-gray-700 dark:text-gray-300">${file.name}</p><div class="w-1/3">${statusIndicator}</div><button class="remove-file text-red-500 ml-2">❌</button>`;
                fileItem.querySelector('.remove-file').onclick = () => { filesToProcess.delete(id); renderFileList() }
                fileList.appendChild(fileItem);
            });

            generateGlossaryBtn.disabled = (filesToProcess.size === 0) || [...filesToProcess.values()].some(f => f.status !== 'complete');
        }


        async function handleFile(file) {
            const id = uuidv4();
            if (Array.from(filesToProcess.values()).some(f => f.file.name === file.name && f.file.lastModified === file.lastModified)) { return; }

            filesToProcess.set(id, { hash: null, file, status: 'hashing', progress: 0 });
            renderFileList();

            var fileData = filesToProcess.get(id);
            const fileHash = await getFileHash(file, (progress) => { fileData.progress = progress; renderFileList(); });

            if (!filesToProcess.has(id)) { return; }
            const exists = [...filesToProcess.values()].find(f => f.hash === fileHash);
            if (exists) { filesToProcess.delete(id); return renderFileList(); }

            filesToProcess.set(id, { hash: fileHash, file, status: 'checking' });
            renderFileList();

            const existingData = await checkFileHash(fileHash);
            if (existingData) { filesToProcess.set(id, { hash: fileHash, file, status: 'complete', data: existingData }); return renderFileList(); }

            const supported = await checkFileSupport(file);
            if (!supported) { filesToProcess.set(id, { hash: fileHash, file, status: 'error', data: 'File type or size not supported' }); }
            if (!supported) { return renderFileList(); }

            filesToProcess.set(id, { hash: fileHash, file, status: 'waiting' });
            renderFileList();

            let count = () => [...filesToProcess.values()].filter(f => f.status === 'uploading').length;
            let waiting = () => [...filesToProcess.values()].find(f => f.status === 'waiting') || {};
            let wait = () => ((count() >= 3) || (waiting().hash !== fileHash)) && filesToProcess.has(id);
            while (wait()) { await new Promise(resolve => setTimeout(resolve, 100 + Math.random()*100)); }
            if (!filesToProcess.has(id)) { return; }

            filesToProcess.set(id, { hash: fileHash, file, status: 'uploading', progress: 0 });
            var fileData = filesToProcess.get(id);
            const result = await uploadFile(fileHash, file, (progress) => { fileData.progress = progress; renderFileList(); });
            if (!filesToProcess.has(id)) { return; }
            filesToProcess.set(id, { hash: fileHash, file, status: result.status, data: result.data });
            renderFileList();
        }

        async function handleFiles(files) {
            if (!socketId) { return alert(lang[currentLang].not_connected); }
            for (const file of files) { handleFile(file) }
        }

        async function checkFileHash(hash) {
            try {
                const response = await fetch('/glossary', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ hashes: [hash] })
                });

                if (!response.ok) { return null; }
                return (await response.json()).data;
            } catch (error) {
                console.error('Error checking file existence:', error);
                return null;
            }
        }

        async function checkFileSupport(file) {
            try {
                const buffer = await file.slice(0, 1024).arrayBuffer();
                const header = Array.from(new Uint8Array(buffer));

                const response = await fetch('/supported/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename: file.name, filesize: file.size, header: header })
                });

                return (response.status === 200);
            } catch (error) {
                console.error('Error checking file support:', error);
                return false;
            }
        }

        async function getFileHash(file, onProgress) {
            return new Promise((resolve, reject) => {
                const sha256 = CryptoJS.algo.SHA256.create();
                const reader = new FileReader();
                const chunkSize = 1024 * 1024 * 5;
                let offset = 0;

                reader.onload = () => {
                    if (reader.error) { return reject(reader.error); }
                    const wordArray = CryptoJS.lib.WordArray.create(reader.result);
                    sha256.update(wordArray);
                    offset += wordArray.sigBytes;
                    onProgress(Math.round((offset / file.size) * 100));
                    if (offset < file.size) { readNextChunk(); }
                    else { resolve(sha256.finalize().toString(CryptoJS.enc.Hex)); }
                };

                reader.onerror = (err) => reject(err);
                const readNextChunk = () => reader.readAsArrayBuffer(file.slice(offset, offset + chunkSize));
                readNextChunk();
            });
        }

        async function uploadFile(hash, file, onProgress) {
            return new Promise((resolve, reject) => {
                if (!socketId) { return reject(new Error("Connection error.")); }
                const xhr = new XMLHttpRequest();
                const formData = new FormData();
                formData.append('file', file, file.name);

                xhr.upload.onprogress = (event) => {
                    if (event.lengthComputable) { onProgress(Math.round((event.loaded / event.total) * 100)) };
                };

                xhr.onload = () => {
                    try {
                        const result = JSON.parse(xhr.responseText);
                        if (xhr.status >= 200 && xhr.status < 300) { return resolve({ status: 'complete', data: result.data }); }
                        throw new Error(result.message || 'Upload failed');
                    } catch (e) {
                        resolve({ status: 'error', data: 'Server response invalid.' });
                    }
                };

                xhr.onerror = () => resolve({ status: 'error', data: 'Network error.' });
                xhr.open('POST', `/upload/${socketId}`, true);
                xhr.timeout = 0;
                xhr.send(formData);
            });
        }


        async function sendActivityUpdate(activityData) {
            try {
                await fetch('/activity', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(activityData),
                });
            } catch (error) {
                console.error('Failed to send activity update:', error);
            }
        }

        function saveChangeLocally(entryUid, field, value) {
            localStorage.setItem(`local_${entryUid}_${field}`, value);
            return value;
        };

        function applyLocalChanges(hashes) {
            document.querySelectorAll('.glossary-term').forEach(term => {
                const entryUid = term.getAttribute('data-entry-uid');
                const localTerm = localStorage.getItem(`local_${entryUid}_term`);
                if (localTerm) { term.innerText = localTerm; }
            });

            document.querySelectorAll('.glossary-definition').forEach(def => {
                const entryUid = def.getAttribute('data-entry-uid');
                const localDef = localStorage.getItem(`local_${entryUid}_definition`);
                if (localDef) { def.innerText = localDef; }
            });

            document.querySelectorAll('.glossary-item').forEach(item => {
                const entryUid = item.getAttribute('data-entry-uid');
                const isRemoved = localStorage.getItem(`local_${entryUid}_removed`) === '1';
                item.classList.toggle('removed', isRemoved);
                item.querySelector('.glossary-term').contentEditable = !isRemoved;
                item.querySelector('.glossary-definition').contentEditable = !isRemoved;
            });

            Object.keys(localStorage).forEach(key => {
                const hashes = JSON.parse(resultContent.getAttribute('glossary-hashes')).join();
                if (!key.includes('_added') || !key.includes(hashes)) { return; }
                const termData = JSON.parse(localStorage.getItem(key));
                window.addGlossaryEntry(termData.term, termData.definition, null, null, key.split('_')[1]);
            });
        };


        window.addGlossaryEntry = function(term, definition, uid, glossary_hash, local_id) {
            const container = document.createElement('div');
            container.className = 'glossary-item flex justify-between items-start mb-2 border-b border-gray-200 dark:border-gray-700 pb-2';
            if (uid) { container.setAttribute('data-entry-uid', uid); }
            if (glossary_hash) { container.setAttribute('data-glossary-hash', glossary_hash); }
            if (local_id) { container.setAttribute('data-local-id', local_id); }

            const termP = document.createElement('p');
            termP.className = 'font-bold glossary-term text-gray-800 dark:text-gray-200';
            termP.innerText = term;
            termP.contentEditable = !local_id;
            if (glossary_hash) { termP.setAttribute('data-glossary-hash', glossary_hash); }
            if (uid) { termP.setAttribute('data-entry-uid', uid); }
            if (local_id) { termP.setAttribute('data-local-id', local_id); }

            const definitionP = document.createElement('p');
            definitionP.className = 'ml-4 glossary-definition text-gray-700 dark:text-gray-300';
            definitionP.innerText = definition;
            definitionP.contentEditable = !local_id;
            if (glossary_hash) { definitionP.setAttribute('data-glossary-hash', glossary_hash); }
            if (uid) { definitionP.setAttribute('data-entry-uid', uid); }
            if (local_id) { definitionP.setAttribute('data-local-id', local_id); }

            const textWrapper = document.createElement('div');
            textWrapper.className = 'flex-grow';
            textWrapper.appendChild(termP);
            textWrapper.appendChild(definitionP);

            const buttonsWrapper = document.createElement('div');
            buttonsWrapper.className = 'flex-shrink-0 ml-4';
            buttonsWrapper.innerHTML = `
                <button class="remove-btn text-gray-400 hover:text-red-500 dark:text-gray-500 dark:hover:text-red-400 select-none" data-lang-title="remove_term" title="${lang[currentLang].remove_term}">❌</button>
                <button class="restore-btn text-gray-400 hover:text-green-500 dark:text-gray-500 dark:hover:text-green-400 select-none" data-lang-title="restore_term" title="${lang[currentLang].restore_term}">✔️</button>
            `;

            container.appendChild(textWrapper);
            container.appendChild(buttonsWrapper);

            let insertionPoint = null;
            const allItems = resultContent.querySelectorAll('.glossary-item:not(.new-term-editor)');

            for (const item of allItems) {
                const existingTerm = item.querySelector('.glossary-term').innerText;
                if (term.localeCompare(existingTerm) < 0) {
                    insertionPoint = item;
                    break;
                }
            }

            if (insertionPoint) {
                resultContent.insertBefore(container, insertionPoint);
            } else {
                resultContent.appendChild(container);
            }

            if (local_id) { container.classList.add('local-term'); }
            return container;
        };

        generateGlossaryBtn.addEventListener('click', async () => {
            resultContent.innerHTML = `<p class="text-gray-500" data-lang="fetching">${lang[currentLang].fetching}</p>`;
            addTermBtn.classList.add('hidden');
            exportPdfBtn.classList.add('hidden');
            generateGlossaryBtn.disabled = true;

            const hashes = Array.from(filesToProcess.values()).map(file => file.hash);
            if (hashes.length === 0) {
                resultContent.innerHTML = `<span data-lang="no_files_ready">${lang[currentLang].no_files_ready}</span>`;
                return generateGlossaryBtn.disabled = false;
            }

            try {
                const response = await fetch('/glossary', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ hashes })
                });

                const result = await response.json();
                if (!response.ok) { throw new Error(result.message || `Server error: ${response.status}`); }
                resultContent.setAttribute('glossary-hashes', JSON.stringify(hashes));
                const allGlossaryReports = result.data.glossaries || [];

                const allGlossaryTerms = allGlossaryReports.flatMap(report => report.glossary.map(entry => ({ ...entry, glossary_hash: report.hash })));
                if (allGlossaryTerms.length === 0) { return resultContent.innerHTML = `<span data-lang="no_terms_found">${lang[currentLang].no_terms_found}</span>`;  }

                const uniqueGlossaryTerms = Array.from(new Map(allGlossaryTerms.map(item => [item.term, item])).values());

                resultContent.innerHTML = '';

                uniqueGlossaryTerms.forEach(item => window.addGlossaryEntry(item.term, item.definition, item.uid, item.glossary_hash));

                addTermBtn.classList.remove('hidden');
                exportPdfBtn.classList.remove('hidden');

                applyLocalChanges(hashes.join(','));
            } catch (error) {
                console.log(error);
                resultContent.innerHTML = `<p class="text-red-500"><span data-lang="error_occurred">${lang[currentLang].error_occurred}</span> ${error.message}</p>`;
            } finally {
                generateGlossaryBtn.disabled = false;
            }
        });


        resultContent.addEventListener('blur', (event) => {
            const target = event.target;
            const isTerm = target.classList.contains('glossary-term');
            const isDefinition = target.classList.contains('glossary-definition');
            if (!isTerm && !isDefinition) { return; }
            if (target.closest('.local-term')) { return; }

            const hashes = JSON.parse(resultContent.getAttribute('glossary-hashes'));
            const glossary_hash = target.getAttribute('data-glossary-hash');
            const entry_uid = target.getAttribute('data-entry-uid');
            if (target.innerText == localStorage.getItem(`local_${entry_uid}_${isTerm ? 'term' : 'definition'}`)) { return; }
            if (entry_uid) { saveChangeLocally(entry_uid, (isTerm ? 'term' : 'definition'), target.innerText); }

            if (target.hasAttribute('data-local-id')) {
                const local_id = target.getAttribute('data-local-id');
                const term = isTerm ? target.innerText : target.parentElement.querySelector('.glossary-term').innerText;
                const definition = isDefinition ? target.innerText : target.parentElement.querySelector('.glossary-definition').innerText;
            }

            if (entry_uid && target.innerText.trim()) { sendActivityUpdate({ hashes, glossary_hash, entry_uid, event: (isTerm ? 'MODIFIED_TERM' : 'MODIFIED_DEFINITION'), data: target.innerText }); }
        }, true);

        resultContent.addEventListener('keydown', (event) => {
            const target = event.target;
            const isEditable = target.classList.contains('glossary-term') || target.classList.contains('glossary-definition');
            if (!isEditable) { return; }
            if (event.key !== 'Enter' && event.key !== 'Escape') { return; }
            event.preventDefault();
            target.blur();
        });


        resultContent.addEventListener('click', (event) => {
            const removeBtn = event.target.closest('.remove-btn');
            const restoreBtn = event.target.closest('.restore-btn');
            if (!removeBtn && !restoreBtn) { return; }

            const container = event.target.closest('.glossary-item');
            const hashes = JSON.parse(resultContent.getAttribute('glossary-hashes'));
            const glossary_hash = container.getAttribute('data-glossary-hash');
            const entry_uid = container.getAttribute('data-entry-uid');

            if (container.hasAttribute('data-local-id')) {
                const term = container.querySelector('.glossary-term').innerText;
                const definition = container.querySelector('.glossary-definition').innerText;
                localStorage.removeItem(`local_${container.getAttribute('data-local-id')}_added`);
                sendActivityUpdate({ hashes: hashes, event: 'ADDED_TERM', data: JSON.stringify({ term, definition, remove: true }) });
                return container.remove();
            }

            if (removeBtn) {
                container.classList.add('removed');
                container.querySelector('.glossary-term').contentEditable = false;
                container.querySelector('.glossary-definition').contentEditable = false;
                saveChangeLocally(entry_uid, 'removed', '1');
                sendActivityUpdate({ hashes, glossary_hash, entry_uid, event: 'REMOVED_TERM', data: '1' });
            } else if (restoreBtn) {
                container.classList.remove('removed');
                container.querySelector('.glossary-term').contentEditable = true;
                container.querySelector('.glossary-definition').contentEditable = true;
                saveChangeLocally(entry_uid, 'removed', '0');
                sendActivityUpdate({ hashes, glossary_hash, entry_uid, event: 'RESTORED_TERM', data: '0' });
            }
        });

        document.getElementById('show-removed-toggle').addEventListener('change', function() {
            resultContent.classList.toggle('hide-removed', !this.checked);
        });


        addTermBtn.addEventListener('click', () => {
            if (document.querySelector('.new-term-editor')) { return; }
            addTermBtn.disabled = true;

            const editorContainer = document.createElement('div');
            editorContainer.className = 'new-term-editor mb-2 transition-colors';
            editorContainer.innerHTML = `
                <div>
                    <p contenteditable="true" data-placeholder="${lang[currentLang].new_term_ph}"
                    class="font-bold glossary-term p-2 bg-white dark:bg-gray-900 text-gray-900 dark:text-white rounded border border-gray-300 dark:border-gray-600 outline-none focus:ring-2 focus:ring-blue-500"></p>
                    <p contenteditable="true" data-placeholder="${lang[currentLang].definition_ph}"
                    class="ml-4 glossary-definition p-2 bg-white dark:bg-gray-900 text-gray-900 dark:text-white rounded border border-gray-300 dark:border-gray-600 outline-none focus:ring-2 focus:ring-blue-500 mt-2"></p>
                </div>
                <div class="flex justify-end items-center space-x-2 mt-2">
                    <button class="cancel-new-term-btn text-sm text-gray-600 dark:text-gray-300 hover:text-black dark:hover:text-white" data-lang="cancel">${lang[currentLang].cancel}</button>
                    <button class="save-new-term-btn text-sm bg-blue-500 text-white py-1 px-3 rounded hover:bg-blue-600" data-lang="save_term">${lang[currentLang].save_term}</button>
                </div>
            `;

            resultContent.prepend(editorContainer);
            editorContainer.querySelector('.glossary-term').focus();
        });

        resultContent.addEventListener('click', async (event) => {
            const saveBtn = event.target.closest('.save-new-term-btn');
            const cancelBtn = event.target.closest('.cancel-new-term-btn');
            if (!saveBtn && !cancelBtn) { return; }

            const editorContainer = event.target.closest('.new-term-editor');
            if (!editorContainer) { return; } else { addTermBtn.disabled = false; }
            if (cancelBtn) { return editorContainer.remove(); }

            const term = editorContainer.querySelector('.glossary-term').innerText.trim();
            const definition = editorContainer.querySelector('.glossary-definition').innerText.trim();
            if (!term || !definition) { return alert(lang[currentLang].provide_both); }
            const hashes = JSON.parse(resultContent.getAttribute('glossary-hashes'));

            sendActivityUpdate({ hashes: hashes, event: 'ADDED_TERM', data: JSON.stringify({ term, definition }) });

            var local_id = saveChangeLocally(`${hashes.join()}_${Date.now()}`, 'added', JSON.stringify({ term, definition }));

            const newItem = window.addGlossaryEntry(term, definition, null, null, local_id);
            newItem.scrollIntoView({ behavior: 'smooth', block: 'center' });

            editorContainer.remove();
        });


        exportPdfBtn.addEventListener('click', async () => {
            const rows = Array.from(document.querySelectorAll('#result-content .glossary-item')).map(item => {
                if (item.classList.contains('removed') || item.classList.contains('new-term-editor')) { return null; }
                const get = (name) => item.querySelector(name).innerText.trim();
                return [get('.glossary-term'), get('.glossary-definition')];
            }).filter(e => e);

            if (rows.length === 0) { return alert(lang[currentLang].no_terms_export); }
            const hashes = JSON.parse(resultContent.getAttribute('glossary-hashes'));
            sendActivityUpdate({ hashes: hashes, event: 'EXPORTED_GLOSSARY' });

            const originalText = exportPdfBtn.innerHTML;
            exportPdfBtn.disabled = true;
            exportPdfBtn.innerHTML = '...';

            try {
                const regularUrl = '/fonts/Roboto-Regular.ttf';
                const boldUrl  = '/fonts/Roboto-Bold.ttf';
                const [regularRes, boldRes] = await Promise.all([fetch(regularUrl), fetch(boldUrl)]);
                if (!regularRes.ok || !boldRes.ok) { throw new Error('Failed to load font files'); }
                const regularBuf = new Uint8Array(await regularRes.arrayBuffer());
                const boldBuf = new Uint8Array(await boldRes.arrayBuffer());
                const regularBase64 = window.btoa(regularBuf.reduce((data, byte) => data + String.fromCharCode(byte), ''));
                const boldBase64 = window.btoa(boldBuf.reduce((data, byte) => data + String.fromCharCode(byte), ''));

                const doc = new window.jspdf.jsPDF();
                doc.addFileToVFS("Roboto-Regular.ttf", regularBase64);
                doc.addFont("Roboto-Regular.ttf", "Roboto", "normal");
                doc.addFileToVFS("Roboto-Bold.ttf", boldBase64);
                doc.addFont("Roboto-Bold.ttf", "Roboto", "bold");
                doc.setFont("Roboto");

                doc.autoTable({
                    head: [[lang[currentLang].pdf_col_term, lang[currentLang].pdf_col_def]], body: rows, startY: 10, theme: 'grid',
                    styles: { font: "Roboto",  fontStyle: 'normal', fontSize: 10, cellPadding: 3, overflow: 'linebreak' },
                    headStyles: { fillColor: [37, 99, 235], textColor: 255, font: "Roboto", fontStyle: 'bold' },
                    columnStyles: { 0: { cellWidth: 50, fontStyle: 'bold' }, 1: { cellWidth: 'auto' } }
                });

                const newWindow = window.open('', '_blank');
                if (!newWindow) { return alert(lang[currentLang].allow_popups); }
                newWindow.document.write(lang[currentLang].creating_pdf);
                newWindow.location.href = doc.output('bloburl');
            } catch (error) {
                console.error(error);
                alert(lang[currentLang].error_pdf + error.message);
            } finally {
                exportPdfBtn.disabled = false;
                exportPdfBtn.innerHTML = originalText;
            }
        });
    </script>
</body>
